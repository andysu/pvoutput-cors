<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/pvoutput-cors/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A mobile application for monitoring PV systems via PVOutput API.">
  

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PVOutput">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>PVOutput Mobile</title>
  <link rel="manifest" href="manifest.json">
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #000000;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <div id="unsupported-ui" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#fff; text-align:center; padding:40px; box-sizing:border-box; font-family:sans-serif; z-index:10000;">
    <h1 style="color:#FFD700; margin-top:20%;">Потрібне оновлення</h1>
    <p style="font-size:18px; line-height:1.5;">Ваш пристрій або браузер застарів.<br>Для роботи додатка потрібна версія <b>iOS 13.0</b> або новіша.</p>
    <hr style="border:0; border-top:1px solid #333; margin:30px 0;">
    <h1 style="color:#FFD700;">Update Required</h1>
    <p style="font-size:18px; line-height:1.5;">Your device or browser is too old.<br>This app requires <b>iOS 13.0</b> or newer.</p>
  </div>

  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      var splash = document.getElementById("splash");
      if (splash && splash.parentNode) { splash.parentNode.removeChild(splash); }
      var branding = document.getElementById("splash-branding");
      if (branding && branding.parentNode) { branding.parentNode.removeChild(branding); }
      document.body.style.background = "transparent";
    }

    (function() {
      var ua = navigator.userAgent;
      
      // Перевірка на стару iOS (нижче 13)
      var isOldIOS = false;
      if (/iPhone|iPad|iPod/.test(ua)) {
        var match = ua.match(/OS (\d+)_/);
        if (match && parseInt(match[1], 10) < 13) {
          isOldIOS = true;
        }
      }

      // Перевірка на відсутність WebAssembly (критично для Flutter)
      var supportsWasm = typeof WebAssembly === "object" && typeof WebAssembly.instantiate === "function";

      if (isOldIOS || !supportsWasm) {
        // Показуємо заглушку
        document.getElementById("unsupported-ui").style.display = "block";
        var splash = document.getElementById("splash");
        if (splash) splash.style.display = "none";
      } else {
        // Стандартний завантажувач для нормальних пристроїв
        var script = document.createElement('script');
        script.src = "flutter_bootstrap.js";
        script.async = true;
        document.head.appendChild(script);
      }
    })();
  </script>
</body></html>
