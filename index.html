<!DOCTYPE html><html><head>

    it to work correctly.

    This is a placeholder for base href that will be replaced by the value of

  <base href="/pvoutput-cors/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A mobile application for monitoring PV systems via PVOutput API.">
  

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PVOutput">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>PVOutput Mobile</title>
  <link rel="manifest" href="manifest.json">
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #000000;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      var splash = document.getElementById("splash");
      if (splash && splash.parentNode) { splash.parentNode.removeChild(splash); }
      var branding = document.getElementById("splash-branding");
      if (branding && branding.parentNode) { branding.parentNode.removeChild(branding); }
      document.body.style.background = "transparent";
    }

    (function() {
      var ua = navigator.userAgent;
      var isLegacyIOS = /iPhone|iPad|iPod/.test(ua) && /OS 12_/.test(ua);

      if (isLegacyIOS) {
        // --- LOGIC FOR iOS 12 (iPhone 6) ---
        window.flutterConfiguration = { renderer: "html" };
        
        // Вивід помилок ТІЛЬКИ для iOS 12
        window.onerror = function(msg, url, line, col, error) {
          var div = document.createElement("div");
          div.style.position = "fixed"; div.style.top = "0"; div.style.left = "0";
          div.style.background = "red"; div.style.color = "white"; div.style.zIndex = "9999";
          div.style.fontSize = "10px"; div.style.padding = "5px";
          div.innerHTML = "iOS 12 Error: " + msg + " at " + line + ":" + col;
          document.body.appendChild(div);
        };

        // Вимикаємо Service Worker для iOS 12
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            for(var i = 0; i < regs.length; i++) { regs[i].unregister(); }
          });
        }

        window.addEventListener('load', function() {
          var script = document.createElement('script');
          script.src = 'main.dart.js';
          window._flutter = window._flutter || {};
          window._flutter.loader = {
            didCreateEngineInitializer: function(engineInitializer) {
              engineInitializer.initializeEngine({ renderer: 'html' }).then(function(appRunner) {
                removeSplashFromWeb();
                appRunner.runApp();
              });
            }
          };
          document.body.appendChild(script);
        });
      } else {
        // --- LOGIC FOR MODERN BROWSERS ---
        var script = document.createElement('script');
        script.src = "flutter_bootstrap.js";
        script.async = true;
        document.head.appendChild(script);
      }
    })();
  </script>
</body></html>
