<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/pvoutput-cors/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A mobile application for monitoring PV systems via PVOutput API.">
  

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PVOutput">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>PVOutput Mobile</title>
  <link rel="manifest" href="manifest.json">
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #000000;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    // Вивід помилок на екран для iOS 12
    window.onerror = function(msg, url, line, col, error) {
      var div = document.createElement("div");
      div.style.position = "fixed"; div.style.top = "0"; div.style.left = "0";
      div.style.background = "red"; div.style.color = "white"; div.style.zIndex = "9999";
      div.style.fontSize = "10px"; div.style.padding = "5px";
      div.innerHTML = "Error: " + msg + " at " + line + ":" + col;
      document.body.appendChild(div);
    };

    window.flutterConfiguration = {
      renderer: "html"
    };

    // Вимикаємо Service Worker для iOS 12
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(var i = 0; i < registrations.length; i++) {
          registrations[i].unregister();
        }
      });
    }

    function removeSplashFromWeb() {
      var splash = document.getElementById("splash");
      if (splash && splash.parentNode) { splash.parentNode.removeChild(splash); }
      var branding = document.getElementById("splash-branding");
      if (branding && branding.parentNode) { branding.parentNode.removeChild(branding); }
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  
  <script>
    window.flutterConfiguration = {
      renderer: "html"
    };

    // Safe Loader для iOS 12
    window.addEventListener('load', function(ev) {
      var script = document.createElement('script');
      script.src = 'main.dart.js';
      script.type = 'application/javascript';
      
      // Ініціалізація Flutter Engine після завантаження main.dart.js
      window._flutter = window._flutter || {};
      window._flutter.loader = {
        didCreateEngineInitializer: function(engineInitializer) {
          engineInitializer.initializeEngine({
            renderer: 'html'
          }).then(function(appRunner) {
            if (typeof removeSplashFromWeb === 'function') {
              removeSplashFromWeb();
            }
            appRunner.runApp();
          });
        }
      };
      
      document.body.appendChild(script);
    });
  </script>
</body></html>
